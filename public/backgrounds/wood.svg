<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <pattern id="woodGrain" patternUnits="userSpaceOnUse" width="60" height="800">
      <rect width="60" height="800" fill="#d7ccc8"/>
      <line x1="10" y1="0" x2="10" y2="800" stroke="#c4b6b0" stroke-width="1" opacity="0.6"/>
      <line x1="25" y1="0" x2="25" y2="800" stroke="#bcaaa4" stroke-width="0.5" opacity="0.4"/>
      <line x1="45" y1="0" x2="45" y2="800" stroke="#c4b6b0" stroke-width="0.8" opacity="0.5"/>
    </pattern>
    <linearGradient id="woodOverlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#efebe9;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#d7ccc8;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#a1887f;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#woodGrain)"/>
  <rect width="1200" height="800" fill="url(#woodOverlay)"/>
</svg>
