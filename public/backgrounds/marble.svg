<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <pattern id="marblePattern" patternUnits="userSpaceOnUse" width="200" height="200">
      <rect width="200" height="200" fill="#f5f5f5"/>
      <path d="M0 50 Q50 30 100 50 T200 50" stroke="#e0e0e0" stroke-width="2" fill="none" opacity="0.5"/>
      <path d="M0 100 Q80 80 150 100 T200 100" stroke="#d0d0d0" stroke-width="1.5" fill="none" opacity="0.4"/>
      <path d="M0 150 Q30 140 80 150 T200 150" stroke="#e0e0e0" stroke-width="1" fill="none" opacity="0.3"/>
    </pattern>
    <linearGradient id="marbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#marbleGrad)"/>
  <rect width="1200" height="800" fill="url(#marblePattern)" opacity="0.8"/>
</svg>
